<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family: ui-rounded, 'SF Pro Rounded', 'Arial Rounded MT Bold', 'Nunito', system-ui, sans-serif;
    background:#eef2ff; color:#334155;
    padding-bottom: calc(88px + env(safe-area-inset-bottom));
    user-select:none; -webkit-user-select:none; overscroll-behavior:none;
  }
  button { font-family:inherit; border:none; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  button:active { transform:scale(.96); }

  .hdr { background:linear-gradient(#4f46e5,#6366f1); color:#fff; padding:calc(14px + env(safe-area-inset-top)) 16px 18px; border-radius:0 0 26px 26px; box-shadow:0 6px 18px rgba(79,70,229,.35); display:flex; justify-content:space-between; align-items:center; }
  .hdr h1 { font-size:24px; font-weight:800; text-shadow:0 2px 4px rgba(0,0,0,.15); }
  .hdr .sub { color:#c7d2fe; font-weight:700; font-size:13px; }
  .lvl { background:rgba(255,255,255,.22); border-radius:16px; padding:6px 12px; text-align:right; color:#fff; }
  .lvl .n { font-weight:800; font-size:17px; }
  .lvl .bar { width:80px; height:8px; background:rgba(255,255,255,.3); border-radius:99px; overflow:hidden; margin:3px 0; }
  .lvl .bar i { display:block; height:100%; background:#fcd34d; border-radius:99px; transition:width .5s; }
  .lvl .xp { font-size:10px; font-weight:700; color:#e0e7ff; }

  .wrap { padding:12px 16px 16px; max-width:520px; margin:0 auto; }
  .card { background:#fff; border-radius:24px; box-shadow:0 4px 14px rgba(51,65,85,.08); }
  .tabhead { padding:16px; text-align:center; margin-top:4px; }

  .modal { background:#fff; border-radius:26px; padding:28px 24px; width:100%; max-width:330px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.3); animation:popin .35s cubic-bezier(.34,1.56,.64,1); }
  .modal h3 { font-size:22px; font-weight:800; color:#475569; }
  .modal .bige { font-size:64px; margin-top:10px; animation:shine 1.6s ease-in-out infinite; display:inline-block; }
  .modal .nm { font-weight:800; font-size:17px; margin-top:8px; color:#4f46e5; }

  .btn-plain { margin-top:8px; width:100%; padding:14px; border-radius:16px; background:#f1f5f9; color:#475569; font-weight:800; font-size:16px; }
  .confetti-bit { position:fixed; top:-40px; z-index:60; pointer-events:none; animation:fall linear forwards; }

  #splash { position:fixed; inset:0; z-index:100; background:linear-gradient(160deg,#312e81,#4f46e5 55%,#818cf8); display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .5s; }
  #splash.hide { opacity:0; pointer-events:none; }
  #splash .s-plane { font-size:88px; animation:flyin 1.1s cubic-bezier(.2,.8,.3,1) both; filter:drop-shadow(0 8px 16px rgba(0,0,0,.25)); }
  #splash .s-title { color:#fff; font-size:34px; font-weight:800; margin-top:10px; text-shadow:0 2px 8px rgba(0,0,0,.2); animation:fadeup .6s .5s both; }
  #splash .s-sub { color:#c7d2fe; font-weight:700; font-size:15px; letter-spacing:.12em; margin-top:2px; animation:fadeup .6s .7s both; }
  #splash .s-cloud { position:absolute; font-size:50px; opacity:.7; animation:drift 5s ease-in-out infinite alternate; }

  @keyframes fall { to { transform:translateY(110vh) rotate(560deg); opacity:.8; } }
  @keyframes popin { from { transform:scale(.5); opacity:0; } to { transform:scale(1); opacity:1; } }
  @keyframes shine { 0%,100% { transform:scale(1); } 50% { transform:scale(1.12); } }
  @keyframes hover { 0%,100% { margin-top:0; } 50% { margin-top:-5px; } }
  @keyframes flyin { from { transform:translateX(-60vw) translateY(30px) rotate(-8deg); opacity:0; } to { transform:none; opacity:1; } }
  @keyframes fadeup { from { transform:translateY(14px); opacity:0; } to { transform:none; opacity:1; } }
  @keyframes drift { from { transform:translateX(-10px); } to { transform:translateX(12px); } }
  @keyframes twinkle { 0%,100% { opacity:.3; } 50% { opacity:1; } }
  .star { position:absolute; color:#fff; animation:twinkle 2.4s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { * { animation:none !important; transition:none !important; } }
</style>

<body>

<div id="splash" aria-hidden="true">
  <span class="s-cloud" style="top:16%;left:12%">☁️</span>
  <span class="s-cloud" style="top:26%;right:10%;font-size:36px;animation-delay:1s">☁️</span>
  <span class="s-cloud" style="bottom:20%;left:18%;font-size:42px;animation-delay:2s">☁️</span>
  <div class="s-plane">✈️</div>

  <div class="s-sub" id="splashSub">SKY MISSION</div>
</div>

<div class="hdr">
  <div>
    <h1 id="hdrTitle">✈️ Flight Buddy</h1>
    <div class="sub">Sky Mission</div>
  </div>
  <button class="lvl" id="lvlBtn">
    <div class="n" id="lvlN">Lv 1 ⭐</div>
    <div class="bar"><i id="lvlBar" style="width:0%"></i></div>
    <div class="xp" id="lvlXp">0 XP</div>
  </button>
</div>

<div class="wrap" id="main"></div>
<nav id="nav"></nav>
<div id="overlays"></div>

<script>
"use strict";

/* ========== CUSTOMIZE ME ==========
   e.g. APP_NAME = "Leo's Flight Buddy"; PILOT_NAME = "Leo"; */
const APP_NAME = "Flight Buddy";
const PILOT_NAME = "";
/* ================================== */

/* ---------- LANGUAGE DATA ---------- */
/* Dutch game: emoji -> pick the Dutch word (he speaks NL & EN, so it's a fun match) */
const NL_WORDS = [
  { e:"✈️", en:"Airplane", nl:"Vliegtuig" }, { e:"☁️", en:"Cloud", nl:"Wolk" },
  { e:"🌞", en:"Sun", nl:"Zon" }, { e:"🧳", en:"Suitcase", nl:"Koffer" },
  { e:"🪟", en:"Window", nl:"Raam" }, { e:"🍎", en:"Apple", nl:"Appel" },
  { e:"💺", en:"Seat", nl:"Stoel" }, { e:"🌊", en:"Sea", nl:"Zee" },
  { e:"🗺️", en:"Map", nl:"Kaart" }, { e:"🛬", en:"Landing", nl:"Landing" },
  { e:"🎧", en:"Headphones", nl:"Koptelefoon" }, { e:"🚻", en:"Toilet", nl:"WC" },
];
/* Hindi: transliterated (he can't read Devanagari) + audio + meaning options */
const HI_WORDS = [
  { hi:"Namaste", dev:"नमस्ते", e:"🙏", en:"Hello" },
  { hi:"Dhanyavaad", dev:"धन्यवाद", e:"🙏", en:"Thank you" },
  { hi:"Paani", dev:"पानी", e:"💧", en:"Water" },
  { hi:"Khaana", dev:"खाना", e:"🍛", en:"Food" },
  { hi:"Vimaan", dev:"विमान", e:"✈️", en:"Airplane" },
  { hi:"Baadal", dev:"बादल", e:"☁️", en:"Cloud" },
  { hi:"Suraj", dev:"सूरज", e:"🌞", en:"Sun" },
  { hi:"Chaand", dev:"चाँद", e:"🌙", en:"Moon" },
  { hi:"Ek", dev:"एक", e:"1️⃣", en:"One" },
  { hi:"Do", dev:"दो", e:"2️⃣", en:"Two" },
  { hi:"Teen", dev:"तीन", e:"3️⃣", en:"Three" },
  { hi:"Haan", dev:"हाँ", e:"👍", en:"Yes" },
  { hi:"Nahin", dev:"नहीं", e:"👎", en:"No" },
  { hi:"Accha", dev:"अच्छा", e:"😊", en:"Good" },
];

/* ---------- MISSIONS ---------- */
const CLOUD_BINGO = ["🐘|Animal shape","⛰️|Mountain shape","🥖|Long cloud","🌅|Golden cloud","🧊|Tiny puff","🌫️|Fog blanket","🏰|Castle shape","🐟|Fish shape","💨|Wispy line"];
const WINDOW_LIST = [
  { id:"wing", e:"🛩️", n:"See the wing" }, { id:"river", e:"🏞️", n:"Spot a river" },
  { id:"road", e:"🛣️", n:"Find a road" }, { id:"plane", e:"✈️", n:"Another plane" },
  { id:"coast", e:"🏖️", n:"The coastline" }, { id:"city", e:"🏙️", n:"A city below" },
];
const LAYOVER_LIST = [
  { id:"gate", e:"🚪", n:"Find your next gate" }, { id:"tail", e:"🛫", n:"Spot 3 plane tails" },
  { id:"walk", e:"🛤️", n:"Ride a moving walkway" }, { id:"flag", e:"🚩", n:"Find a flag" },
  { id:"water", e:"⛲", n:"Fill your water bottle" }, { id:"sleep", e:"😴", n:"Someone sleeping" },
  { id:"dog", e:"🐕", n:"A dog or pet" }, { id:"shop", e:"🍫", n:"A chocolate shop" },
];

const BADGES = [
  { id:"takeoff", e:"🛫", n:"First Takeoff",   ok:s=>!!s.startedAt },
  { id:"cloud",   e:"☁️", n:"Cloud Scientist", ok:s=>s.cloudWon },
  { id:"sky",     e:"🌍", n:"Sky Explorer",    ok:s=>s.window.length>=6 },
  { id:"nl",      e:"🇳🇱", n:"Woord Kampioen",  ok:s=>s.nlScore>=10 },
  { id:"hi",      e:"🇮🇳", n:"Hindi Star",      ok:s=>s.hiScore>=10 },
  { id:"artist",  e:"🎨", n:"Travel Artist",   ok:s=>s.drew },
  { id:"zen",     e:"🧘", n:"Zen Master",      ok:s=>s.breathed },
  { id:"layover", e:"🧳", n:"Layover Hero",    ok:s=>s.layover.length>=6 },
  { id:"champ",   e:"🏆", n:"Flight Champion", ok:s=>s.landed },
];

/* ---------- STATE ---------- */
const KEY = "flight-buddy-v1";
const DEF = { xp:0, from:"", to:"", durMin:0, startedAt:0, landed:false,
  cloud:[], cloudWon:false, window:[], layover:[], nlScore:0, hiScore:0, drew:false, breathed:false };
let S = load();
let tab = "flight";
let game = null, memory = null, quiz = null;
let breath = null;

function load(){ try { const r = localStorage.getItem(KEY); if (r) return Object.assign({}, DEF, JSON.parse(r)); } catch(e){} return Object.assign({}, DEF); }
function save(){ try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e){} }
function esc(x){ return String(x).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function shuffle(a){ return a.map(x=>({x,r:Math.random()})).sort((p,q)=>p.r-q.r).map(p=>p.x); }

/* ---------- AUDIO (Hindi speech) ---------- */
let hiVoice = null;
function pickVoice(){
  try {
    const vs = speechSynthesis.getVoices();
    hiVoice = vs.find(v=>v.lang && v.lang.toLowerCase().startsWith("hi")) || null;
  } catch(e){}
}
if ("speechSynthesis" in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function speakHindi(dev, translit){
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(hiVoice ? dev : translit);
    if (hiVoice) u.voice = hiVoice;
    u.lang = hiVoice ? hiVoice.lang : "hi-IN";
    u.rate = 0.85;
    speechSynthesis.speak(u);
  } catch(e){}
}

/* ---------- CELEBRATIONS ---------- */
function confetti(){
  const emo = ["🎉","⭐","✨","🎈","💜","💛"];
  for (let i=0;i<26;i++){
    const b = document.createElement("span");
    b.className = "confetti-bit"; b.textContent = emo[i%emo.length];
    b.style.left = (Math.random()*100)+"%"; b.style.fontSize = (18+Math.random()*22)+"px";
    b.style.animationDelay = (Math.random()*0.4)+"s"; b.style.animationDuration = (1.4+Math.random()*1.2)+"s";
    document.body.appendChild(b); setTimeout(()=>b.remove(), 3200);
  }
}
function badgeModal(e, name, xp, msg){
  document.getElementById("overlays").innerHTML = `
  <div class="overlay"><div class="modal">
    <h3>Badge earned!</h3><div class="bige">${e}</div>
    <div class="nm">${esc(name)}</div>${xp?`<div class="xpg">+${xp} XP</div>`:""}
    ${msg?`<p>${esc(msg)}</p>`:""}
    <button class="btn-yay" onclick="closeOverlay()">Awesome! ✨</button>
  </div></div>`;
}
function closeOverlay(){ document.getElementById("overlays").innerHTML=""; }

/* ---------- FLIGHT TRACKER ---------- */
function startFlight(){
  const from = document.getElementById("inFrom").value.trim() || "Home";
  const to = document.getElementById("inTo").value.trim() || "Holiday";
  const h = parseInt(document.getElementById("inH").value)||0;
  const m = parseInt(document.getElementById("inM").value)||0;
  const dur = h*60+m;
  if (dur < 1){ alert("Set the flight time first ✈️"); return; }
  S.from = from; S.to = to; S.durMin = dur; S.startedAt = Date.now(); S.landed = false;
  S.xp += 20; save(); confetti(); render();
}
function flightPct(){
  if (!S.startedAt || !S.durMin) return 0;
  return Math.min(100, ((Date.now()-S.startedAt)/60000) / S.durMin * 100);
}
function flightMsg(p){
  if (S.landed) return "Welcome to " + S.to + "! 🎉";
  if (p < 5) return "Taking off! Hold tight! 🚀";
  if (p < 25) return "Up, up in the sky! ☁️";
  if (p < 45) return "Cruising above the clouds 😎";
  if (p < 55) return "Halfway to " + S.to + "! 🎉";
  if (p < 75) return "More than halfway there! 💪";
  if (p < 90) return "Almost there... 🏝️";
  if (p < 100) return "Get ready for landing! 🛬";
  return "Time to land! Tap the button! 🛬";
}
function doLand(){
  S.landed = true; S.xp += 100; save(); confetti();
  const done = BADGES.filter(b=>b.ok(S)).length;
  document.getElementById("overlays").innerHTML = `
  <div class="overlay"><div class="modal">
    <h3>🏆 Flight Completed!</h3><div class="bige">🛬</div>
    <div class="nm">${esc(S.from)} → ${esc(S.to)}</div>
    <div class="xpg">+100 XP</div>
    <p>Badges earned: ${done} · Total XP: ${S.xp}<br>You are a real Flight Champion!</p>
    <button class="btn-yay" onclick="closeOverlay();render()">Hooray! 🎉</button>
  </div></div>`;
  render();
}
function newFlight(){ S.from=""; S.to=""; S.durMin=0; S.startedAt=0; S.landed=false; save(); closeOverlay(); render(); }

function vFlight(){
  if (!S.startedAt){
    return `
    <div class="card setup">
      <h2>🛫 Set up your flight</h2>
      <label>From (departure)</label><input id="inFrom" placeholder="e.g. Amsterdam" value="${esc(S.from)}">
      <label>To (destination)</label><input id="inTo" placeholder="e.g. Delhi" value="${esc(S.to)}">
      <label>Flight time</label>
      <div style="display:flex;gap:10px">
        <select id="inH" style="flex:1">${Array.from({length:16},(_,i)=>`<option value="${i}" ${i===8?"selected":""}>${i} h</option>`).join("")}</select>
        <select id="inM" style="flex:1">${[0,15,30,45].map(m=>`<option value="${m}">${m} min</option>`).join("")}</select>
      </div>
      <button class="btn-main" onclick="startFlight()">Start the adventure! 🚀</button>
    </div>
    <div class="card mission-head" style="margin-top:14px">
      <span class="e">🧳</span>
      <div><div class="t">On a layover?</div><div class="s">Check Missions tab for the Layover Hunt!</div></div>
    </div>`;
  }
  const p = flightPct();

  const stars = Array.from({length:10},(_,i)=>`<span class="star" style="left:${(i*37)%95}%;top:${(i*23)%40}%;font-size:${7+(i%3)*3}px;animation-delay:${i*0.3}s">✦</span>`).join("");
  return `
  <div class="sky">
    <div class="stars">${stars}</div>
    <div class="msg">${esc(flightMsg(p))}</div>
    <div class="pctbig">${Math.floor(p)}%</div>
    <div class="route">
      <div class="line"></div><div class="linefill" style="width:${p*0.84}%"></div>
      <span class="pt" style="left:8%">🏠</span><span class="pt" style="left:92%">🏝️</span>
      <span class="plane" style="left:${8+p*0.84}%">✈️</span>
      <span class="lbl" style="left:8%">${esc(S.from)}</span>
      <span class="lbl" style="left:92%">${esc(S.to)}</span>
    </div>
    <div class="skyrow">
      <div class="skystat"><div class="v">${Math.max(0,mins)} min</div><div class="k">TO GO</div></div>
      <div class="skystat"><div class="v">${Math.floor(p/100*S.durMin)} min</div><div class="k">FLOWN</div></div>
      <div class="skystat"><div class="v">10 km</div><div class="k">HIGH ☁️</div></div>
    </div>
    ${p>=100 && !S.landed ? `<button class="btn-main" style="margin-top:14px" onclick="doLand()">We landed! 🛬</button>` : ""}
    ${S.landed ? `<button class="btn-ind" style="margin-top:14px" onclick="newFlight()">Plan next flight ✈️</button>` : ""}
  </div>
  <div class="card mission-head" style="margin-top:14px">
    <span class="e">🎮</span>
    <div><div class="t">Bored?</div><div class="s">Try the Games and Words tabs while you fly!</div></div>
  </div>`;
}

/* ---------- MISSIONS TAB ---------- */
function cloudTap(i){
  const idx = S.cloud.indexOf(i);
  if (idx>=0) S.cloud.splice(idx,1); else S.cloud.push(i);
  const L = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  if (!S.cloudWon && L.some(l=>l.every(c=>S.cloud.includes(c)))){
    S.cloudWon = true; S.xp += 30; confetti(); save(); render();
    badgeModal("☁️","Cloud Scientist",30,"You found a whole cloud line!"); return;
  }
  save(); render();
}
function windowTap(id){
  if (S.window.includes(id)) return;
  S.window.push(id); S.xp += 10; confetti(); save(); render();
  if (S.window.length===WINDOW_LIST.length) badgeModal("🌍","Sky Explorer",0,"You spotted everything outside!");
}
function layoverTap(id){
  if (S.layover.includes(id)) return;
  S.layover.push(id); S.xp += 10; confetti(); save(); render();
  if (S.layover.length>=6) badgeModal("🧳","Layover Hero",0,"Layover complete — you found them all!");
}
function vMissions(){
  return `
  <div class="card tabhead"><div class="e">🔭</div><div class="t">Sky Missions</div><div class="s">Look out the window and explore!</div></div>

  <div class="card" style="margin-top:14px">
    <div class="mission-head"><span class="e">☁️</span>
      <div><div class="t">Cloud Bingo</div><div class="s">Find cloud shapes · 3 in a row wins</div></div>
      <span class="badge-mini">${S.cloudWon?"🏅":""}</span></div>
    <div style="padding:0 14px 14px"><div class="grid3" style="margin-top:0">` +
    CLOUD_BINGO.map((c,i)=>{ const [e,t]=c.split("|");
      return `<button class="bcell ${S.cloud.includes(i)?"on":""}" onclick="cloudTap(${i})"><span class="e">${e}</span><span class="t">${esc(t)}</span></button>`; }).join("") +
    `</div>${S.cloudWon?'<div class="winline">🎉 CLOUD BINGO!</div>':""}</div>
  </div>

  <div class="sect">🪟 WINDOW EXPLORER · tap what you spot (+10 XP)</div>
  <div class="grid2" style="margin-top:8px">` +
  WINDOW_LIST.map(w=>{ const got=S.window.includes(w.id);
    return `<button class="tile ${got?"got":"dim"}" ${got?"":`onclick="windowTap('${w.id}')"`}>
      <div class="e">${w.e}</div><div class="n">${esc(w.n)}</div><div class="s">${got?"Spotted! ✓":"Keep looking"}</div></button>`; }).join("") +
  `</div>

  <div class="sect">🧳 LAYOVER HUNT · for the airport in between</div>
  <div class="grid2" style="margin-top:8px">` +
  LAYOVER_LIST.map(w=>{ const got=S.layover.includes(w.id);
    return `<button class="tile ${got?"got":"dim"}" ${got?"":`onclick="layoverTap('${w.id}')"`}>
      <div class="e">${w.e}</div><div class="n">${esc(w.n)}</div><div class="s">${got?"Found! ✓":"Go find it"}</div></button>`; }).join("") +
  `</div>`;
}

/* ---------- WORDS TAB (Dutch + Hindi) ---------- */
function startQuiz(lang){
  const pool = lang==="nl" ? shuffle(NL_WORDS) : shuffle(HI_WORDS);
  quiz = { lang, pool, i:0, answered:null };
  game = "quiz"; render();
  if (lang==="hi") setTimeout(()=>{ const w=quiz.pool[0]; speakHindi(w.dev, w.hi); }, 400);
}
function quizOpts(){
  const w = quiz.pool[quiz.i];
  const others = shuffle((quiz.lang==="nl"?NL_WORDS:HI_WORDS).filter(x=>x!==w)).slice(0,2);
  return shuffle([w, ...others]);
}
let currentOpts = null;
function quizAnswer(idx){
  if (quiz.answered!==null) return;
  quiz.answered = idx;
  const w = quiz.pool[quiz.i];
  const right = currentOpts[idx] === w;
  if (right){
    if (quiz.lang==="nl") S.nlScore++; else S.hiScore++;
    S.xp += 10; confetti();
    const score = quiz.lang==="nl"?S.nlScore:S.hiScore;
    if (score===10) setTimeout(()=>badgeModal(quiz.lang==="nl"?"🇳🇱":"🇮🇳", quiz.lang==="nl"?"Woord Kampioen":"Hindi Star",0,"10 words correct — amazing!"),600);
  }
  save(); render();
  setTimeout(()=>{
    quiz.i = (quiz.i+1) % quiz.pool.length;
    if (quiz.i===0) quiz.pool = shuffle(quiz.pool);
    quiz.answered = null; render();
    if (quiz.lang==="hi"){ const nw=quiz.pool[quiz.i]; speakHindi(nw.dev, nw.hi); }
  }, 1100);
}
function vQuiz(){
  const w = quiz.pool[quiz.i];
  if (quiz.answered===null) currentOpts = quizOpts();
  const isNL = quiz.lang==="nl";
  const score = isNL ? S.nlScore : S.hiScore;
  let prompt;
  if (isNL){
    prompt = `<div class="qword"><div class="e">${w.e}</div>
      <div class="hintt">What is this in Dutch? · Wat is dit in het Nederlands?</div></div>`;
  } else {
    prompt = `<div class="qword"><div class="w">${esc(w.hi)}</div>
      <div class="hintt">Hindi word · what does it mean?</div>
      <button class="speak" onclick="speakHindi('${w.dev}','${w.hi}')">🔊 Hear it</button></div>`;
  }
  const opts = currentOpts.map((o,i)=>{
    let cls = "opt";
    if (quiz.answered!==null){
      if (o===w) cls += " right";
      else if (i===quiz.answered) cls += " wrong";
    }
    const label = isNL ? o.nl : (o.e + "  " + o.en);
    return `<button class="${cls}" onclick="quizAnswer(${i})">${esc(label)}</button>`;
  }).join("");
  return `<button class="back" onclick="game=null;render()">← Back</button>
  <div class="gamebox">${prompt}<div class="opts">${opts}</div>
  <div class="scoreline">⭐ ${score} correct ${score>=10?"· Badge earned! 🏅":"· get 10 for a badge!"}</div></div>`;
}
function vWords(){
  if (game==="quiz") return vQuiz();
  return `
  <div class="card tabhead"><div class="e">🗣️</div><div class="t">Word Games</div><div class="s">Learn while you fly! +10 XP per word</div></div>
  <div class="glist">
    <button class="gbtn" onclick="startQuiz('nl')"><span class="e">🇳🇱</span>
      <div><div class="n">Nederlandse Woorden</div><div class="d">Pick the right Dutch word · ${S.nlScore} ⭐</div></div><span class="go">▶️</span></button>
    <button class="gbtn" onclick="startQuiz('hi')"><span class="e">🇮🇳</span>
      <div><div class="n">Hindi Listening</div><div class="d">Hear it, guess the meaning · ${S.hiScore} ⭐</div></div><span class="go">▶️</span></button>
  </div>
  <div class="card mission-head" style="margin-top:14px">
    <span class="e">💡</span>
    <div><div class="t">Hindi tip</div><div class="s">Words are written in English letters so you can say them out loud. Tap 🔊 to hear them!</div></div>
  </div>`;
}

/* ---------- GAMES TAB ---------- */
const MEMO = ["✈️","🧳","🌍","🇳🇱","🇮🇳","☁️","🌞","🏝️"];
function openGame(g){
  game = g;
  if (g==="memory"){
    const deck = shuffle(MEMO.concat(MEMO).map((e,i)=>({id:i,e})));
    memory = { deck, flipped:[], matched:[], lock:false };
  }
  render();
  if (g==="draw") setTimeout(initCanvas, 50);
  if (g==="breath") startBreath();
}
function memTap(id){
  const M = memory;
  if (!M||M.lock||M.flipped.includes(id)||M.matched.includes(id)) return;
  M.flipped.push(id); render();
  if (M.flipped.length===2){
    M.lock = true;
    const [a,b] = M.flipped.map(x=>M.deck.find(c=>c.id===x));
    setTimeout(()=>{
      if (a.e===b.e){ M.matched.push(a.id,b.id);
        if (M.matched.length===M.deck.length){ confetti(); S.xp+=30; save(); } }
      M.flipped=[]; M.lock=false; render();
    },700);
  }
}
/* drawing */
let drawCol = "#4f46e5";
function initCanvas(){
  const cv = document.getElementById("cv");
  if (!cv) return;
  const dpr = window.devicePixelRatio||1;
  const w = cv.clientWidth;
  cv.width = w*dpr; cv.height = w*0.75*dpr; cv.style.height = (w*0.75)+"px";
  const ctx = cv.getContext("2d");
  ctx.scale(dpr,dpr); ctx.lineCap="round"; ctx.lineJoin="round";
  let drawing=false, lx=0, ly=0;
  const pos = ev => { const r=cv.getBoundingClientRect(); const t=ev.touches?ev.touches[0]:ev; return [t.clientX-r.left, t.clientY-r.top]; };
  const start = ev => { drawing=true; [lx,ly]=pos(ev); if(!S.drew){S.drew=true;save();setTimeout(()=>badgeModal("🎨","Travel Artist",0,"Your first sky drawing!"),900);} ev.preventDefault(); };
  const move = ev => { if(!drawing) return; const [x,y]=pos(ev);
    ctx.strokeStyle=drawCol; ctx.lineWidth=drawCol==="#ffffff"?18:6;
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(x,y); ctx.stroke(); [lx,ly]=[x,y]; ev.preventDefault(); };
  const end = ()=> drawing=false;
  cv.addEventListener("touchstart",start,{passive:false}); cv.addEventListener("touchmove",move,{passive:false});
  cv.addEventListener("touchend",end); cv.addEventListener("mousedown",start);
  cv.addEventListener("mousemove",move); cv.addEventListener("mouseup",end); cv.addEventListener("mouseleave",end);
}
function setCol(c, el){ drawCol=c; document.querySelectorAll(".swatch").forEach(s=>s.classList.remove("sel")); el.classList.add("sel"); }
function clearCanvas(){ const cv=document.getElementById("cv"); if(cv){ const ctx=cv.getContext("2d"); ctx.clearRect(0,0,cv.width,cv.height); } }
/* breathing */
function startBreath(){
  breath = { phase:"in", cycles:0, timer:null };
  const tick = ()=>{
    if (!breath || game!=="breath") return;
    const c = document.getElementById("bcirc"), t = document.getElementById("btxt"), n = document.getElementById("bcount");
    if (!c) return;
    if (breath.phase==="in"){ c.classList.add("in"); t.textContent="Breathe in… 🌬️"; breath.phase="out"; }
    else { c.classList.remove("in"); t.textContent="Breathe out… 😌"; breath.phase="in"; breath.cycles++;
      if (n) n.textContent = breath.cycles + " / 3 breaths";
      if (breath.cycles>=3 && !S.breathed){ S.breathed=true; S.xp+=20; save();
        setTimeout(()=>{ confetti(); badgeModal("🧘","Zen Master",20,"So calm, so cool."); },1200); } }
    breath.timer = setTimeout(tick, 4000);
  };
  tick();
}
function vGames(){
  if (game==="memory" && memory){
    const M = memory, won = M.matched.length===M.deck.length;
    return `<button class="back" onclick="game=null;render()">← Back</button>
    <div class="gamebox"><div class="ghint">Find the matching travel pairs!</div>
    <div class="mgrid">` + M.deck.map(c=>{
      const up = M.flipped.includes(c.id)||M.matched.includes(c.id);
      return `<button class="mcell ${up?"up":""}" onclick="memTap(${c.id})">${up?c.e:"❓"}</button>`; }).join("") +
    `</div>${won?`<div style="text-align:center"><div class="winline" style="color:#10b981">🎉 All pairs found! +30 XP</div>
      <button class="btn-blue" onclick="openGame('memory')">Play again 🔄</button></div>`:""}</div>`;
  }
  if (game==="draw"){
    return `<button class="back" onclick="game=null;render()">← Back</button>
    <div class="gamebox"><div class="ghint">Draw your airplane — or anything you see outside!</div>
    <canvas id="cv"></canvas>
    <div class="palette">
      <button class="swatch sel" style="background:#4f46e5" onclick="setCol('#4f46e5',this)"></button>
      <button class="swatch" style="background:#f43f5e" onclick="setCol('#f43f5e',this)"></button>
      <button class="swatch" style="background:#10b981" onclick="setCol('#10b981',this)"></button>
      <button class="swatch" style="background:#f59e0b" onclick="setCol('#f59e0b',this)"></button>
      <button class="swatch" style="background:#334155" onclick="setCol('#334155',this)"></button>
      <button class="swatch" style="background:#ffffff" onclick="setCol('#ffffff',this)">🧽</button>
    </div>
    <div style="text-align:center"><button class="btn-blue" onclick="clearCanvas()">Clear 🗑️</button></div></div>`;
  }
  if (game==="breath"){
    return `<button class="back" onclick="game=null;if(breath&&breath.timer)clearTimeout(breath.timer);breath=null;render()">← Back</button>
    <div class="gamebox breath-wrap">
      <div class="btxt" id="btxt">Get comfy… 🪷</div>
      <div class="bcircle" id="bcirc">🪷</div>
      <div class="bcount" id="bcount">0 / 3 breaths</div>
      <div class="ghint" style="margin-top:10px">Follow the circle. Big = breathe in, small = breathe out.</div>
    </div>`;
  }
  return `
  <div class="card tabhead"><div class="e">🎮</div><div class="t">Seat Games</div><div class="s">All offline · perfect for flying</div></div>
  <div class="glist">
    <button class="gbtn" onclick="openGame('memory')"><span class="e">🃏</span>
      <div><div class="n">Memory Match</div><div class="d">Travel pairs · +30 XP</div></div><span class="go">▶️</span></button>
    <button class="gbtn" onclick="openGame('draw')"><span class="e">🎨</span>
      <div><div class="n">Sky Drawing</div><div class="d">Draw your airplane</div></div><span class="go">▶️</span></button>
    <button class="gbtn" onclick="openGame('breath')"><span class="e">🧘</span>
      <div><div class="n">Quiet Mode</div><div class="d">Calm breathing bubble</div></div><span class="go">▶️</span></button>
  </div>`;
}

/* ---------- BADGES ---------- */
function vBadges(){
  return `
  <div class="card tabhead"><div class="e">🏆</div><div class="t">Trophy Cabinet</div></div>
  <div class="grid2">` +
  BADGES.map(b=>{ const got=b.ok(S);
    return `<div class="tile ${got?"gold":"dim"}"><div class="e">${b.e}</div>
      <div class="n">${esc(b.n)}</div><div class="s">${got?"Earned! ⭐":"Locked"}</div></div>`; }).join("") +
  `</div>`;
}

/* ---------- RESET ---------- */
function resetModal(){
  document.getElementById("overlays").innerHTML = `
  <div class="overlay" onclick="closeOverlay()"><div class="modal" onclick="event.stopPropagation()">
    <h3>👨‍👩‍👦 Parents corner</h3>
    <p>Start fresh? All progress, badges and scores will be cleared.</p>
    <button class="btn-danger" onclick="S=Object.assign({},DEF);save();closeOverlay();render()">Reset everything 🔄</button>
    <button class="btn-plain" onclick="closeOverlay()">Keep playing</button>
  </div></div>`;
}

/* ---------- RENDER ---------- */
const TABS = [
  { id:"flight", e:"✈️", t:"Flight" }, { id:"missions", e:"🔭", t:"Missions" },
  { id:"games", e:"🎮", t:"Games" }, { id:"words", e:"🗣️", t:"Words" }, { id:"badges", e:"🏆", t:"Badges" },
];
function setTab(t){ tab=t; game=null; if(breath&&breath.timer){clearTimeout(breath.timer);breath=null;} render(); window.scrollTo(0,0); }
function render(){
  const lv = Math.floor(S.xp/100)+1;
  document.getElementById("lvlN").textContent = "Lv "+lv+" ⭐";
  document.getElementById("lvlBar").style.width = (S.xp%100)+"%";
  document.getElementById("lvlXp").textContent = S.xp+" XP";
  const views = { flight:vFlight, missions:vMissions, games:vGames, words:vWords, badges:vBadges };
  document.getElementById("main").innerHTML = views[tab]();
  document.getElementById("nav").innerHTML = TABS.map(t=>
    `<button class="${tab===t.id?"on":""}" onclick="setTab('${t.id}')"><span class="e">${t.e}</span><span class="t">${t.t}</span></button>`).join("");
}
document.getElementById("lvlBtn").addEventListener("click", resetModal);

/* personalize + splash */
document.title = APP_NAME + " ✈️";
document.querySelector('meta[name="apple-mobile-web-app-title"]').content = APP_NAME;
document.getElementById("splashTitle").textContent = APP_NAME;
document.getElementById("hdrTitle").textContent = "✈️ " + APP_NAME;
if (PILOT_NAME) document.getElementById("splashSub").textContent = "CAPTAIN " + PILOT_NAME.toUpperCase();
setTimeout(()=>{ const sp=document.getElementById("splash"); sp.classList.add("hide"); setTimeout(()=>sp.remove(),600); },1700);

/* live tracker refresh */
setInterval(()=>{ if (tab==="flight" && S.startedAt && !S.landed && !document.querySelector(".overlay")) render(); }, 30000);
render();
</script>
