<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family: ui-rounded, 'SF Pro Rounded', 'Arial Rounded MT Bold', 'Nunito', system-ui, sans-serif;
    background:#e0f2fe; color:#334155;
    padding-bottom: calc(88px + env(safe-area-inset-bottom));
    user-select:none; -webkit-user-select:none;
    overscroll-behavior:none;
  }
  button { font-family:inherit; border:none; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  button:active { transform:scale(.96); }

  /* header */
  .hdr { background:linear-gradient(#0ea5e9,#38bdf8); color:#fff; padding:calc(14px + env(safe-area-inset-top)) 16px 18px; border-radius:0 0 26px 26px; box-shadow:0 6px 18px rgba(14,165,233,.35); display:flex; justify-content:space-between; align-items:center; }
  .hdr h1 { font-size:24px; font-weight:800; text-shadow:0 2px 4px rgba(0,0,0,.15); }
  .hdr .sub { color:#bae6fd; font-weight:700; font-size:13px; }
  .lvl { background:rgba(255,255,255,.22); border-radius:16px; padding:6px 12px; text-align:right; color:#fff; }
  .lvl .n { font-weight:800; font-size:17px; }
  .lvl .bar { width:80px; height:8px; background:rgba(255,255,255,.3); border-radius:99px; overflow:hidden; margin:3px 0; }
  .lvl .bar i { display:block; height:100%; background:#fcd34d; border-radius:99px; transition:width .5s; }
  .lvl .xp { font-size:10px; font-weight:700; color:#e0f2fe; }

  .wrap { padding:12px 16px 16px; max-width:520px; margin:0 auto; }
  .card { background:#fff; border-radius:24px; box-shadow:0 4px 14px rgba(51,65,85,.08); }

  /* progress */
  .prog { padding:16px; margin-top:4px; }
  .prog .row { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:8px; }
  .prog .row b { color:#64748b; font-weight:800; }
  .prog .pct { color:#0ea5e9; font-size:26px; font-weight:800; }
  .track { position:relative; height:24px; background:#e0f2fe; border-radius:99px; }
  .track .fill { height:100%; background:linear-gradient(90deg,#38bdf8,#0ea5e9); border-radius:99px; transition:width .7s; }
  .track .plane { position:absolute; top:50%; transform:translateY(-52%); font-size:18px; transition:left .7s; }
  .ends { display:flex; justify-content:space-between; font-size:11px; font-weight:700; color:#94a3b8; margin-top:4px; }

  /* mission card */
  .mission { margin-top:16px; border:4px solid #fcd34d; overflow:hidden; }
  .mission .ribbon { background:#fcd34d; color:#92400e; font-weight:800; font-size:13px; letter-spacing:.06em; padding:6px 16px; }
  .mission .body { padding:20px; text-align:center; }
  .mission .emoji { font-size:64px; animation:bounce 1.6s ease-in-out infinite; display:inline-block; }
  .mission h2 { font-size:24px; font-weight:800; color:#334155; margin-top:6px; }
  .mission p { color:#64748b; font-weight:600; margin-top:8px; font-size:15px; }
  .btn-go { margin-top:18px; width:100%; padding:18px; border-radius:20px; background:linear-gradient(#fb7185,#f43f5e); color:#fff; font-size:22px; font-weight:800; box-shadow:0 6px 14px rgba(244,63,94,.35); }
  .done-card { margin-top:16px; border:4px solid #6ee7b7; padding:24px; text-align:center; }
  .done-card .emoji { font-size:64px; }
  .done-card h2 { color:#059669; font-size:24px; font-weight:800; margin-top:6px; }
  .done-card p { color:#64748b; font-weight:600; margin-top:4px; }

  .next { margin-top:12px; background:rgba(255,255,255,.7); border-radius:18px; padding:12px 14px; display:flex; align-items:center; gap:12px; }
  .next .e { font-size:28px; filter:grayscale(1); opacity:.6; }
  .next .lbl { font-size:11px; font-weight:800; color:#94a3b8; }
  .next .nm { font-weight:700; color:#64748b; }
  .next .lock { margin-left:auto; font-size:20px; }

  .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .chip { background:#d1fae5; color:#047857; border-radius:99px; padding:6px 12px; font-weight:700; font-size:13px; }
  .sect { font-size:13px; font-weight:800; color:#64748b; margin:16px 2px 8px; }

  /* passport */
  .pass { margin-top:4px; border-radius:26px; overflow:hidden; border:4px solid #312e81; box-shadow:0 8px 20px rgba(49,46,129,.3); }
  .pass .cover { background:#312e81; text-align:center; padding:16px; }
  .pass .cover .e { font-size:30px; }
  .pass .cover .t { color:#fcd34d; font-weight:800; letter-spacing:.18em; font-size:18px; font-family:Georgia,serif; }
  .pass .cover .s { color:#a5b4fc; font-size:10px; font-weight:700; letter-spacing:.2em; }
  .pass .page { background:#fffbeb; padding:20px; background-image:radial-gradient(rgba(0,0,0,.04) 1px, transparent 1px); background-size:14px 14px; }
  .stamps { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .slot { aspect-ratio:1; display:flex; align-items:center; justify-content:center; }
  .stamp { width:100%; height:100%; max-width:116px; max-height:116px; border:4px dashed; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; animation:stampin .5s cubic-bezier(.34,1.8,.64,1) backwards; }
  .stamp .e { font-size:38px; }
  .stamp .t { font-size:9px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; margin-top:2px; }
  .slot .empty { width:100%; height:100%; max-width:116px; max-height:116px; border:4px dashed #e2e8f0; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#cbd5e1; font-size:28px; }
  .pass .cnt { text-align:center; margin-top:16px; font-size:11px; font-weight:800; letter-spacing:.18em; color:rgba(146,64,14,.5); }

  /* grids */
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
  .tile { border-radius:22px; padding:16px 10px; text-align:center; background:#fff; box-shadow:0 4px 12px rgba(51,65,85,.08); }
  .tile .e { font-size:44px; filter:grayscale(1); opacity:.7; }
  .tile .n { font-weight:800; font-size:14px; color:#475569; margin-top:4px; }
  .tile .s { font-size:11px; font-weight:700; color:#94a3b8; margin-top:2px; }
  .tile.got { background:#34d399; }
  .tile.got .e { filter:none; opacity:1; }
  .tile.got .n { color:#fff; }
  .tile.got .s { color:#d1fae5; }
  .tile.gold { background:linear-gradient(#fcd34d,#fbbf24); }
  .tile.gold .e { filter:none; opacity:1; animation:shine 2s ease-in-out infinite; display:inline-block; }
  .tile.gold .n { color:#78350f; }
  .tile.gold .s { color:#92400e; }

  .tabhead { padding:16px; text-align:center; margin-top:4px; }
  .tabhead .e { font-size:38px; }
  .tabhead .t { font-weight:800; font-size:20px; color:#334155; }
  .tabhead .s { font-weight:600; font-size:13px; color:#64748b; margin-top:2px; }

  /* games */
  .glist { display:grid; gap:12px; margin-top:14px; }
  .gbtn { display:flex; align-items:center; gap:16px; padding:18px; border-radius:22px; background:#fff; box-shadow:0 4px 12px rgba(51,65,85,.08); text-align:left; }
  .gbtn .e { font-size:42px; }
  .gbtn .n { font-size:19px; font-weight:800; color:#334155; }
  .gbtn .go { margin-left:auto; font-size:20px; color:#cbd5e1; }
  .back { margin:4px 0 12px; padding:8px 18px; border-radius:99px; background:#fff; box-shadow:0 3px 10px rgba(51,65,85,.1); font-weight:800; color:#475569; font-size:15px; }
  .gamebox { background:#f0f9ff; border-radius:24px; padding:16px; box-shadow:inset 0 2px 8px rgba(14,165,233,.12); }
  .ghint { text-align:center; font-weight:700; color:#64748b; font-size:13px; margin-bottom:10px; }
  .bgrid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .bcell { aspect-ratio:1; border-radius:16px; background:#fff; box-shadow:0 3px 8px rgba(51,65,85,.08); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4px; }
  .bcell .e { font-size:24px; }
  .bcell .t { font-size:9px; font-weight:800; color:#64748b; line-height:1.1; margin-top:3px; text-align:center; }
  .bcell.on { background:#fbbf24; }
  .bcell.on .t { color:#78350f; }
  .winline { text-align:center; font-size:20px; font-weight:800; color:#f59e0b; margin-top:12px; }
  .mgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .mcell { aspect-ratio:1; border-radius:16px; font-size:28px; display:flex; align-items:center; justify-content:center; background:#38bdf8; box-shadow:0 3px 8px rgba(51,65,85,.12); transition:background .2s; }
  .mcell.up { background:#fff; }
  .bignum { text-align:center; font-size:64px; font-weight:800; color:#0ea5e9; }
  .bigsub { text-align:center; font-weight:700; color:#94a3b8; margin-bottom:14px; }
  .btn-big { width:100%; padding:22px; border-radius:24px; background:linear-gradient(#38bdf8,#0ea5e9); color:#fff; font-size:26px; font-weight:800; box-shadow:0 6px 14px rgba(14,165,233,.4); }
  .btn-blue { margin-top:10px; padding:12px 24px; border-radius:16px; background:#0ea5e9; color:#fff; font-weight:800; font-size:16px; }
  .lockscr { text-align:center; padding:56px 24px 0; }
  .lockscr .e { font-size:64px; }
  .lockscr h2 { font-size:20px; font-weight:800; color:#475569; margin-top:12px; }
  .lockscr p { color:#64748b; font-weight:600; margin-top:6px; }

  /* nav */
  nav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #e0f2fe; box-shadow:0 -6px 20px rgba(51,65,85,.08); display:flex; justify-content:space-around; padding:8px 4px calc(max(env(safe-area-inset-bottom), 10px)); z-index:30; }
  nav button { background:none; display:flex; flex-direction:column; align-items:center; padding:6px 10px; border-radius:16px; min-width:60px; }
  nav button .e { font-size:24px; filter:grayscale(1); opacity:.55; }
  nav button .t { font-size:11px; font-weight:800; color:#94a3b8; margin-top:1px; }
  nav button.on { background:#e0f2fe; }
  nav button.on .e { filter:none; opacity:1; }
  nav button.on .t { color:#0284c7; }

  /* overlays */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:40; display:flex; align-items:center; justify-content:center; padding:24px; }
  .modal { background:#fff; border-radius:26px; padding:28px 24px; width:100%; max-width:330px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.3); animation:popin .35s cubic-bezier(.34,1.56,.64,1); }
  .modal h3 { font-size:22px; font-weight:800; color:#475569; }
  .modal .mstamp { margin:14px auto 0; width:126px; height:126px; border:8px dashed; border-radius:50%; display:flex; align-items:center; justify-content:center; animation:stampin .5s cubic-bezier(.34,1.8,.64,1) .15s backwards; }
  .modal .mstamp .e { font-size:56px; }
  .modal .nm { font-weight:800; font-size:17px; margin-top:10px; }
  .modal .xpg { color:#f59e0b; font-weight:800; font-size:20px; margin-top:2px; }
  .btn-yay { margin-top:18px; width:100%; padding:16px; border-radius:18px; background:#0ea5e9; color:#fff; font-size:20px; font-weight:800; }
  .btn-danger { margin-top:16px; width:100%; padding:14px; border-radius:16px; background:#f43f5e; color:#fff; font-weight:800; font-size:16px; }
  .btn-plain { margin-top:8px; width:100%; padding:14px; border-radius:16px; background:#f1f5f9; color:#475569; font-weight:800; font-size:16px; }
  .modal p { color:#64748b; font-weight:600; font-size:14px; margin-top:6px; }


  /* splash */
  #splash { position:fixed; inset:0; z-index:100; background:linear-gradient(160deg,#0ea5e9,#38bdf8 55%,#7dd3fc); display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .5s; }
  #splash.hide { opacity:0; pointer-events:none; }
  #splash .s-plane { font-size:88px; animation:flyin 1.1s cubic-bezier(.2,.8,.3,1) both; filter:drop-shadow(0 8px 16px rgba(0,0,0,.2)); }
  #splash .s-title { color:#fff; font-size:34px; font-weight:800; margin-top:10px; text-shadow:0 2px 8px rgba(0,0,0,.15); animation:fadeup .6s .5s both; }
  #splash .s-sub { color:#bae6fd; font-weight:700; font-size:15px; letter-spacing:.12em; margin-top:2px; animation:fadeup .6s .7s both; }
  #splash .s-cloud { position:absolute; font-size:52px; opacity:.85; animation:drift 5s ease-in-out infinite alternate; }
  @keyframes flyin { from { transform:translateX(-60vw) translateY(30px) rotate(-8deg); opacity:0; } to { transform:none; opacity:1; } }
  @keyframes fadeup { from { transform:translateY(14px); opacity:0; } to { transform:none; opacity:1; } }
  @keyframes drift { from { transform:translateX(-10px); } to { transform:translateX(12px); } }

  .confetti-bit { position:fixed; top:-40px; z-index:60; pointer-events:none; animation:fall linear forwards; }

  @keyframes fall { to { transform:translateY(110vh) rotate(560deg); opacity:.8; } }
  @keyframes popin { from { transform:scale(.5); opacity:0; } to { transform:scale(1); opacity:1; } }
  @keyframes stampin { from { transform:scale(3) rotate(-25deg); opacity:0; } to { transform:scale(1) rotate(-8deg); opacity:1; } }
  @keyframes bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
  @keyframes shine { 0%,100% { transform:scale(1); } 50% { transform:scale(1.12); } }
  @media (prefers-reduced-motion: reduce) { * { animation:none !important; transition:none !important; } }
</style>
</head>
<body>

<div id="splash" aria-hidden="true">
  <span class="s-cloud" style="top:16%;left:12%">☁️</span>
  <span class="s-cloud" style="top:26%;right:10%;font-size:38px;animation-delay:1s">☁️</span>
  <span class="s-cloud" style="bottom:20%;left:18%;font-size:44px;animation-delay:2s">☁️</span>
  <div class="s-plane">✈️</div>
  <div class="s-title" id="splashTitle">Travel Buddy</div>
  <div class="s-sub">AIRPORT MISSION</div>
</div>

<div class="hdr">
  <div>
    <h1>✈️ Travel Buddy</h1>
    <div class="sub">Airport Mission</div>
  </div>
  <button class="lvl" id="lvlBtn">
    <div class="n" id="lvlN">Lv 1 ⭐</div>
    <div class="bar"><i id="lvlBar" style="width:0%"></i></div>
    <div class="xp" id="lvlXp">0 XP</div>
  </button>
</div>

<div class="wrap" id="main"></div>

<nav id="nav"></nav>
<div id="overlays"></div>

<script>
"use strict";

/* ========== CUSTOMIZE ME ==========
   Change these two lines to personalize the app,
   e.g. APP_NAME = "Leo's Travel Buddy";          */
const APP_NAME = "Travel Buddy";
const PILOT_NAME = "";   // e.g. "Leo" -> shows "Captain Leo" on the splash
/* ================================== */

document.title = APP_NAME + " ✈️";
document.querySelector('meta[name="apple-mobile-web-app-title"]').content = APP_NAME;
document.getElementById("splashTitle").textContent = APP_NAME;
if (PILOT_NAME) document.querySelector("#splash .s-sub").textContent = "CAPTAIN " + PILOT_NAME.toUpperCase();
document.querySelector(".hdr h1").textContent = "✈️ " + APP_NAME;
setTimeout(() => {
  const sp = document.getElementById("splash");
  sp.classList.add("hide");
  setTimeout(() => sp.remove(), 600);
}, 1700);

/* ---------- DATA ---------- */
const MISSIONS = [
  { id:"arrive",   emoji:"🧳", title:"Arrive at Airport", tip:"We made it! Find the big doors.", stamp:"🧳", color:"#F59E0B", short:"Airport" },
  { id:"checkin",  emoji:"🎫", title:"Check-in",          tip:"Get your ticket! Say hi to the desk.", stamp:"🎫", color:"#10B981", short:"Check-in" },
  { id:"security", emoji:"🛂", title:"Security Check",    tip:"Bag on the belt. Walk through the magic gate! (No photos here)", stamp:"🛂", color:"#3B82F6", short:"Security" },
  { id:"passport", emoji:"🌍", title:"Passport Control",  tip:"Show your passport. Stand very still!", stamp:"🌍", color:"#8B5CF6", short:"Passport" },
  { id:"gate",     emoji:"🚪", title:"Find the Gate",     tip:"Hunt for your gate number on the signs!", stamp:"🚪", color:"#EC4899", short:"Gate" },
  { id:"board",    emoji:"✈️", title:"Board the Plane",   tip:"Ticket ready… walk the tunnel… you're flying!", stamp:"✈️", color:"#EF4444", short:"Boarding" },
];
const SPOTTER = [
  { id:"logo", e:"🛩️", n:"Airline Logo" }, { id:"colors", e:"🌈", n:"Colorful Plane" },
  { id:"bus", e:"🚌", n:"Airport Bus" }, { id:"baggage", e:"🚚", n:"Baggage Truck" },
  { id:"fuel", e:"⛽", n:"Fuel Truck" }, { id:"tractor", e:"🚜", n:"Pushback Tractor" },
  { id:"tower", e:"🗼", n:"Control Tower" }, { id:"bridge", e:"🌉", n:"Jet Bridge" },
];
const BINGO = ["🧑‍✈️|Pilot","🐶|Dog","☕|Coffee cup","🎒|Red backpack","👶|Baby","🕶️|Sunglasses","📱|Phone person","🧢|Cap","🛒|Luggage cart"];
const MEMO = ["✈️","🧳","🎫","🌍","🚌","🗼"];
const BADGES = [
  { id:"first",  e:"🥇", n:"First Mission",    ok:s=>s.done.length>=1 },
  { id:"sec",    e:"🦺", n:"Security Expert",  ok:s=>s.done.includes("security") },
  { id:"nav",    e:"🧭", n:"Junior Navigator", ok:s=>s.done.includes("gate") },
  { id:"master", e:"👑", n:"Airport Master",   ok:s=>s.done.length>=6 },
  { id:"spot",   e:"🔭", n:"Plane Spotter",    ok:s=>s.spotted.length>=4 },
  { id:"super",  e:"🌟", n:"Super Spotter",    ok:s=>s.spotted.length>=8 },
  { id:"wait",   e:"🎮", n:"Waiting Champion", ok:s=>s.gamesPlayed>=1 },
  { id:"bingo",  e:"🎉", n:"Bingo Star",       ok:s=>s.bingoWon },
];

/* ---------- STATE ---------- */
const KEY = "travel-buddy-v1";
const DEF = { done:[], spotted:[], xp:0, gamesPlayed:0, bingoWon:false, bingo:[], takeoffs:0 };
let S = load();
let tab = "mission";
let game = null; // null | bingo | memory | takeoff
let memory = null; // transient memory game state

function load(){
  try { const r = localStorage.getItem(KEY); if (r) return Object.assign({}, DEF, JSON.parse(r)); } catch(e){}
  return Object.assign({}, DEF);
}
function save(){ try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e){} }
function esc(x){ return String(x).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---------- CELEBRATIONS ---------- */
function confetti(){
  const emo = ["🎉","⭐","✨","🎈","💛","💙"];
  for (let i=0;i<26;i++){
    const b = document.createElement("span");
    b.className = "confetti-bit";
    b.textContent = emo[i%emo.length];
    b.style.left = (Math.random()*100)+"%";
    b.style.fontSize = (18+Math.random()*22)+"px";
    b.style.animationDelay = (Math.random()*0.4)+"s";
    b.style.animationDuration = (1.4+Math.random()*1.2)+"s";
    document.body.appendChild(b);
    setTimeout(()=>b.remove(), 3200);
  }
}
function stampModal(m){
  const o = document.getElementById("overlays");
  o.innerHTML = `
  <div class="overlay" id="ovl">
    <div class="modal">
      <h3>Mission Complete!</h3>
      <div class="mstamp" style="border-color:${m.color};color:${m.color}"><span class="e">${m.stamp}</span></div>
      <div class="nm" style="color:${m.color}">New passport stamp!</div>
      <div class="xpg">+50 XP</div>
      <button class="btn-yay" onclick="closeOverlay()">Yay! ✨</button>
    </div>
  </div>`;
}
function resetModal(){
  const o = document.getElementById("overlays");
  o.innerHTML = `
  <div class="overlay" id="ovl">
    <div class="modal">
      <h3>👨‍👩‍👦 Parents corner</h3>
      <p>Start a new trip? All stamps and badges will be cleared.</p>
      <button class="btn-danger" onclick="resetAll()">Reset for new trip 🔄</button>
      <button class="btn-plain" onclick="closeOverlay()">Keep playing</button>
    </div>
  </div>`;
}
function closeOverlay(){ document.getElementById("overlays").innerHTML=""; }
function resetAll(){ S = Object.assign({}, DEF); save(); closeOverlay(); render(); }

/* ---------- ACTIONS ---------- */
function completeMission(id){
  const m = MISSIONS.find(x=>x.id===id);
  if (!m || S.done.includes(id)) return;
  S.done.push(id); S.xp += 50; save();
  confetti(); stampModal(m); render();
}
function spot(id){
  if (S.spotted.includes(id)) return;
  S.spotted.push(id); S.xp += 10; save();
  confetti(); render();
}
function setTab(t){ tab = t; game = null; render(); window.scrollTo(0,0); }
function openGame(g){
  game = g;
  if (g === "memory") {
    const deck = MEMO.concat(MEMO).map(e=>({e, r:Math.random()})).sort((a,b)=>a.r-b.r).map((c,i)=>({id:i, e:c.e}));
    memory = { deck, flipped:[], matched:[], lock:false };
  }
  if (g === "bingo" || g === "takeoff") { if (S.gamesPlayed < 1) { S.gamesPlayed = 1; save(); } }
  render();
}
function bingoTap(i){
  const idx = S.bingo.indexOf(i);
  if (idx >= 0) S.bingo.splice(idx,1); else S.bingo.push(i);
  const L = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const won = L.some(l => l.every(c => S.bingo.includes(c)));
  if (won && !S.bingoWon){ S.bingoWon = true; S.xp += 30; confetti(); }
  save(); render();
}
function memTap(id){
  const M = memory;
  if (!M || M.lock || M.flipped.includes(id) || M.matched.includes(id)) return;
  M.flipped.push(id); render();
  if (M.flipped.length === 2){
    M.lock = true;
    const [a,b] = M.flipped.map(x => M.deck.find(c=>c.id===x));
    setTimeout(()=>{
      if (a.e === b.e){
        M.matched.push(a.id, b.id);
        if (M.matched.length === M.deck.length){ confetti(); S.gamesPlayed++; save(); }
      }
      M.flipped = []; M.lock = false; render();
    }, 700);
  }
}
function takeoffTap(){ S.takeoffs++; if (S.gamesPlayed<1) S.gamesPlayed=1; save(); render(); }

/* ---------- VIEWS ---------- */
function vMissions(){
  const pct = Math.round(S.done.length / MISSIONS.length * 100);
  const ci = MISSIONS.findIndex(m => !S.done.includes(m.id));
  const cur = ci >= 0 ? MISSIONS[ci] : null;
  const nxt = ci >= 0 && ci+1 < MISSIONS.length ? MISSIONS[ci+1] : null;
  let h = `
  <div class="card prog">
    <div class="row"><b>Your journey</b><span class="pct">${pct}%</span></div>
    <div class="track">
      <div class="fill" style="width:${Math.max(pct,6)}%"></div>
      <span class="plane" style="left:calc(${Math.max(pct,6)}% - 22px)">✈️</span>
    </div>
    <div class="ends"><span>🏠 Home</span><span>🏝️ Holiday!</span></div>
  </div>`;
  if (cur){
    h += `
  <div class="card mission">
    <div class="ribbon">⭐ MISSION ${ci+1} OF ${MISSIONS.length}</div>
    <div class="body">
      <span class="emoji">${cur.emoji}</span>
      <h2>${esc(cur.title)}</h2>
      <p>${esc(cur.tip)}</p>
      <button class="btn-go" onclick="completeMission('${cur.id}')">Mission Complete! ✅</button>
    </div>
  </div>`;
  } else {
    h += `
  <div class="card done-card">
    <div class="emoji">🏝️</div>
    <h2>All missions done!</h2>
    <p>You are an Airport Master! Check your badges 🏆</p>
  </div>`;
  }
  if (nxt){
    h += `
  <div class="next">
    <span class="e">${nxt.emoji}</span>
    <div><div class="lbl">UP NEXT</div><div class="nm">${esc(nxt.title)}</div></div>
    <span class="lock">🔒</span>
  </div>`;
  }
  if (S.done.length){
    h += `<div class="sect">DONE ✔️</div><div class="chips">` +
      MISSIONS.filter(m=>S.done.includes(m.id)).map(m=>`<span class="chip">${m.emoji} ${esc(m.title)} ✓</span>`).join("") +
      `</div>`;
  }
  return h;
}

function vPassport(){
  const slots = MISSIONS.map((m,i)=>{
    if (S.done.includes(m.id)){
      const rot = (i%2?1:-1)*(5+i*2);
      return `<div class="slot"><div class="stamp" style="border-color:${m.color};color:${m.color};transform:rotate(${rot}deg)">
        <span class="e">${m.stamp}</span><span class="t">${esc(m.short)}</span></div></div>`;
    }
    return `<div class="slot"><div class="empty">?</div></div>`;
  }).join("");
  return `
  <div class="pass">
    <div class="cover"><div class="e">🛂</div><div class="t">JUNIOR PASSPORT</div><div class="s">TRAVEL BUDDY AIRLINES</div></div>
    <div class="page">
      <div class="stamps">${slots}</div>
      <div class="cnt">★ ${S.done.length} / ${MISSIONS.length} STAMPS COLLECTED ★</div>
    </div>
  </div>`;
}

function vSpotter(){
  return `
  <div class="card tabhead"><div class="e">🔭</div><div class="t">Plane Spotter</div>
  <div class="s">Look around! Tap it when you find it. +10 XP each</div></div>
  <div class="grid2">` +
  SPOTTER.map(x=>{
    const got = S.spotted.includes(x.id);
    return `<button class="tile ${got?"got":""}" ${got?"":`onclick="spot('${x.id}')"`}>
      <div class="e">${x.e}</div><div class="n">${esc(x.n)}</div>
      <div class="s">${got?"Found! ✓":"Tap when spotted"}</div></button>`;
  }).join("") + `</div>`;
}

function vGames(){
  if (!S.done.includes("gate")){
    return `<div class="lockscr"><div class="e">🔒</div><h2>Gate Mode is locked</h2>
    <p>Finish the "Find the Gate" mission to unlock waiting games!</p></div>`;
  }
  if (!game){
    return `
    <div class="card tabhead"><div class="e">🎮</div><div class="t">Gate Mode</div><div class="s">Waiting is fun now!</div></div>
    <div class="glist">
      <button class="gbtn" onclick="openGame('bingo')"><span class="e">🎯</span><span class="n">Airport Bingo</span><span class="go">▶️</span></button>
      <button class="gbtn" onclick="openGame('memory')"><span class="e">🃏</span><span class="n">Memory Match</span><span class="go">▶️</span></button>
      <button class="gbtn" onclick="openGame('takeoff')"><span class="e">✈️</span><span class="n">Count Takeoffs</span><span class="go">▶️</span></button>
    </div>`;
  }
  let inner = "";
  if (game === "bingo"){
    inner = `<div class="ghint">Spot these people &amp; things. 3 in a row = BINGO!</div><div class="bgrid">` +
      BINGO.map((item,i)=>{
        const [e,t] = item.split("|");
        return `<button class="bcell ${S.bingo.includes(i)?"on":""}" onclick="bingoTap(${i})">
          <span class="e">${e}</span><span class="t">${esc(t)}</span></button>`;
      }).join("") + `</div>` + (S.bingoWon ? `<div class="winline">🎉 BINGO! +30 XP</div>` : "");
  }
  if (game === "memory" && memory){
    const M = memory;
    const won = M.matched.length === M.deck.length;
    inner = `<div class="ghint">Find the matching pairs!</div><div class="mgrid">` +
      M.deck.map(c=>{
        const up = M.flipped.includes(c.id) || M.matched.includes(c.id);
        return `<button class="mcell ${up?"up":""}" onclick="memTap(${c.id})">${up?c.e:"❓"}</button>`;
      }).join("") + `</div>` +
      (won ? `<div style="text-align:center"><div class="winline" style="color:#10b981">🎉 You found them all!</div>
        <button class="btn-blue" onclick="openGame('memory')">Play again 🔄</button></div>` : "");
  }
  if (game === "takeoff"){
    inner = `<div class="ghint">Watch the runway. Tap for every takeoff you see!</div>
      <div class="bignum">${S.takeoffs}</div><div class="bigsub">planes counted</div>
      <button class="btn-big" onclick="takeoffTap()">✈️ TAKEOFF!</button>`;
  }
  return `<button class="back" onclick="game=null;render()">← Back</button><div class="gamebox">${inner}</div>`;
}

function vBadges(){
  return `
  <div class="card tabhead"><div class="e">🏆</div><div class="t">Trophy Cabinet</div></div>
  <div class="grid2">` +
  BADGES.map(b=>{
    const got = b.ok(S);
    return `<div class="tile ${got?"gold":""}"><div class="e">${b.e}</div>
      <div class="n">${esc(b.n)}</div>${got?'<div class="s">Earned! ⭐</div>':'<div class="s">Locked</div>'}</div>`;
  }).join("") + `</div>`;
}

/* ---------- RENDER ---------- */
const TABS = [
  { id:"mission", e:"✈️", t:"Mission" }, { id:"passport", e:"🛂", t:"Passport" },
  { id:"spotter", e:"🔭", t:"Spotter" }, { id:"games", e:"🎮", t:"Games" },
  { id:"badges", e:"🏆", t:"Badges" },
];
function render(){
  const lv = Math.floor(S.xp/100)+1;
  document.getElementById("lvlN").textContent = "Lv " + lv + " ⭐";
  document.getElementById("lvlBar").style.width = (S.xp % 100) + "%";
  document.getElementById("lvlXp").textContent = S.xp + " XP";

  const views = { mission:vMissions, passport:vPassport, spotter:vSpotter, games:vGames, badges:vBadges };
  document.getElementById("main").innerHTML = views[tab]();

  document.getElementById("nav").innerHTML = TABS.map(t =>
    `<button class="${tab===t.id?"on":""}" onclick="setTab('${t.id}')">
      <span class="e">${t.e}</span><span class="t">${t.t}</span></button>`).join("");
}
document.getElementById("lvlBtn").addEventListener("click", resetModal);
render();
</script>
</body>
</html>
